<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Hypper Drive 2 | 10-103NK</title>

<link rel="shortcut icon" href="TemplateData/favicon.ico">
<link rel="stylesheet" href="TemplateData/style.css">

<script src="TemplateData/UnityProgress.js"></script>
<script src="Build/UnityLoader.js"></script>

<style>
html, body {
    width:100%;
    height:100%;
    margin:0;
    overflow:hidden;
}

.webgl-content,
#unityContainer{
    width:100%;
    height:100%;
}
</style>

<script>
(async function () {

    console.log("Downloading split data file...");

    const [part1, part2] = await Promise.all([
        fetch("./Build/103NK_Html5.data.unityweb.part1").then(r=>{
            if(!r.ok) throw new Error("Missing part1");
            return r.arrayBuffer();
        }),
        fetch("./Build/103NK_Html5.data.unityweb.part2").then(r=>{
            if(!r.ok) throw new Error("Missing part2");
            return r.arrayBuffer();
        })
    ]);

    console.log("Merging...");

    const mergedBlob = new Blob(
        [part1, part2],
        {
            type:"application/octet-stream"
        }
    );

    const mergedURL = URL.createObjectURL(mergedBlob);

    console.log("Merged into memory.");

    const originalFetch = window.fetch.bind(window);

    window.fetch = function(resource, init){

        let url = "";

        if(resource instanceof Request)
            url = resource.url;
        else
            url = String(resource);

        if(url.endsWith("103NK_Html5.data.unityweb")){
            console.log("Serving merged data from memory.");
            return originalFetch(mergedURL);
        }

        return originalFetch(resource, init);
    };

    var unityInstance = UnityLoader.instantiate(
        "unityContainer",
        "Build/103NK_Html5.json",
        {
            onProgress: UnityProgress
        }
    );

})();
</script>

</head>

<body>

<div class="webgl-content">
    <div id="unityContainer"></div>
</div>

</body>
</html>
